<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0a0a0f; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: #12121e; border-radius: 16px; padding: 30px; width: 100%; max-width: 900px; border: 1px solid #2a2a45; box-shadow: 0 0 60px rgba(100, 0, 255, 0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #1e1e35; }
        .header h1 { color: #fff; font-size: 24px; font-weight: 700; }
        .header h1 span { color: #8b5cf6; }
        .stats { display: flex; gap: 20px; }
        .stats div { text-align: center; }
        .stats div .num { color: #fff; font-size: 22px; font-weight: 700; }
        .stats div .label { color: #6b6b8a; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .stats div .num.active-keys { color: #34d399; }
        .stats div .num.expired-keys { color: #f87171; }
        .generate-section { background: #18182a; border-radius: 12px; padding: 20px; margin-bottom: 25px; border: 1px solid #22223f; }
        .generate-section h3 { color: #c4c4e0; font-size: 14px; font-weight: 600; margin-bottom: 15px; }
        .generate-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .generate-row input, .generate-row select { background: #0e0e1a; border: 1px solid #2a2a48; border-radius: 8px; padding: 10px 14px; color: #fff; font-size: 14px; outline: none; transition: border-color 0.2s; }
        .generate-row input:focus, .generate-row select:focus { border-color: #8b5cf6; }
        .generate-row input::placeholder { color: #4a4a6a; }
        .generate-row input[type="text"] { flex: 1; min-width: 150px; }
        .generate-row select { min-width: 120px; cursor: pointer; }
        .generate-row select option { background: #12121e; color: #fff; }
        .btn { padding: 10px 24px; border: none; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.2s; background: #8b5cf6; color: #fff; }
        .btn:hover { background: #7c3aed; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(139, 92, 246, 0.3); }
        .btn-danger { background: #dc2626; }
        .btn-danger:hover { background: #b91c1c; box-shadow: 0 4px 20px rgba(220, 38, 38, 0.3); }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid #1e1e35; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        thead { background: #16162a; }
        th { text-align: left; padding: 12px 16px; color: #8a8ab0; font-weight: 600; font-size: 12px; text-transform: uppercase; border-bottom: 1px solid #22223f; }
        td { padding: 12px 16px; color: #d4d4ec; border-bottom: 1px solid #1a1a30; }
        tr:hover td { background: #18182a; }
        .key-code { font-family: 'Courier New', monospace; font-weight: 600; color: #c4b5fd; font-size: 13px; letter-spacing: 0.5px; }
        .status-badge { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .status-active { background: rgba(52, 211, 153, 0.15); color: #34d399; }
        .status-expired { background: rgba(248, 113, 113, 0.15); color: #f87171; }
        .status-used { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
        .actions { display: flex; gap: 6px; flex-wrap: wrap; }
        .actions .btn { padding: 4px 10px; font-size: 11px; }
        .empty-state { text-align: center; padding: 30px 20px; color: #4a4a6a; font-size: 14px; }
        .footer { margin-top: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; color: #4a4a6a; font-size: 13px; }
        .footer .right { display: flex; gap: 15px; align-items: center; }
        .copy-feedback { color: #34d399; font-size: 13px; opacity: 0; transition: opacity 0.3s; }
        .copy-feedback.show { opacity: 1; }
        @media (max-width: 600px) {
            .container { padding: 16px; }
            .header { flex-direction: column; align-items: flex-start; gap: 12px; }
            .stats { width: 100%; justify-content: space-around; }
            .generate-row { flex-direction: column; }
            .generate-row input, .generate-row select, .generate-row .btn { width: 100%; }
            .footer { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🔑 <span>Key</span> System</h1>
            <div class="stats">
                <div><div class="num active-keys" id="activeCount">0</div><div class="label">Активных</div></div>
                <div><div class="num expired-keys" id="expiredCount">0</div><div class="label">Истекло</div></div>
                <div><div class="num" id="totalCount" style="color:#fff;">0</div><div class="label">Всего</div></div>
            </div>
        </div>

        <div class="generate-section">
            <h3>➕ Создать ключ</h3>
            <div class="generate-row">
                <input type="text" id="prefixInput" placeholder="Префикс (опционально)" value="">
                <select id="durationSelect">
                    <option value="1">1 день</option>
                    <option value="3" selected>3 дня</option>
                    <option value="7">7 дней</option>
                    <option value="14">14 дней</option>
                    <option value="30">30 дней</option>
                    <option value="60">60 дней</option>
                    <option value="90">90 дней</option>
                    <option value="180">180 дней</option>
                    <option value="365">1 год</option>
                    <option value="0">Бессрочно</option>
                </select>
                <button class="btn" id="generateBtn">Сгенерировать</button>
            </div>
            <div style="margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center;">
                <span style="color:#6b6b8a; font-size:13px;">Массово:</span>
                <input type="number" id="bulkCount" value="5" min="1" max="50" style="width:70px; background:#0e0e1a; border:1px solid #2a2a48; border-radius:6px; padding:6px 10px; color:#fff;">
                <button class="btn btn-sm" id="bulkBtn">Создать 5</button>
            </div>
        </div>

        <div class="table-wrap">
            <table>
                <thead><tr><th>Ключ</th><th>Создан</th><th>Истекает</th><th>Статус</th><th>Действия</th></tr></thead>
                <tbody id="keysBody"></tbody>
            </table>
        </div>

        <div class="footer">
            <div><span id="keysCount">0</span> ключей в базе</div>
            <div class="right">
                <span class="copy-feedback" id="copyFeedback">✅ Скопировано!</span>
                <button class="btn btn-sm btn-danger" id="clearAllBtn">🗑 Очистить все</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  JSON ДАННЫЕ ДЛЯ LUA
        //  Эти данные Lua скачивает и парсит
        // ============================================================
        var keysData = {
            "DEMO-ABC1-2345-6789": { expires: "2025-12-31", used: false },
            "FREE-0000-0000-0001": { expires: "0", used: false },
            "RIVALS-2024-0001": { expires: "2026-01-01", used: false },
            "TEST-XXXX-YYYY-ZZZZ": { expires: "2025-06-30", used: false }
        };

        // ============================================================
        //  КОД ДЛЯ РАБОТЫ САМОГО HTML
        // ============================================================
        let keys = [];

        function loadKeys() {
            try {
                const stored = localStorage.getItem('keySystemData');
                if (stored) {
                    keys = JSON.parse(stored);
                } else {
                    const now = Date.now();
                    keys = Object.keys(keysData).map(key => ({
                        id: 'k_' + key,
                        key: key,
                        prefix: key.split('-')[0] || '',
                        createdAt: now,
                        expiresAt: keysData[key].expires === '0' ? 0 : now + parseInt(keysData[key].expires) * 86400000,
                        used: keysData[key].used || false
                    }));
                }
            } catch (e) { keys = []; }
            render();
        }

        function saveKeys() {
            try {
                localStorage.setItem('keySystemData', JSON.stringify(keys));
            } catch (e) {}
            render();
        }

        function generateKey(prefix, days) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = '';
            for (let i = 0; i < 12; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
            const parts = code.match(/.{1,4}/g);
            let keyStr = parts.join('-');
            if (prefix && prefix.trim()) keyStr = prefix.trim().toUpperCase() + '-' + keyStr;
            const now = Date.now();
            return {
                id: 'k_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
                key: keyStr,
                prefix: prefix ? prefix.trim().toUpperCase() : '',
                createdAt: now,
                expiresAt: days > 0 ? now + days * 86400000 : 0,
                used: false,
            };
        }

        function addKey(keyObj) {
            keys.unshift(keyObj);
            saveKeys();
        }

        function render() {
            const tbody = document.getElementById('keysBody');
            tbody.innerHTML = '';
            if (keys.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="empty-state">Нет ключей. Создайте первый!</td></tr>`;
            } else {
                keys.forEach((k) => {
                    const now = Date.now();
                    const isExpired = k.expiresAt !== 0 && k.expiresAt < now;
                    const isActive = !isExpired && !k.used;
                    const status = k.used ? 'used' : (isExpired ? 'expired' : 'active');
                    let statusText = 'Активен', statusClass = 'status-active';
                    if (status === 'used') { statusText = 'Использован'; statusClass = 'status-used'; }
                    if (status === 'expired') { statusText = 'Истек'; statusClass = 'status-expired'; }
                    const createdDate = new Date(k.createdAt).toLocaleDateString('ru-RU');
                    const expiresDate = k.expiresAt === 0 ? '∞' : new Date(k.expiresAt).toLocaleDateString('ru-RU');
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><span class="key-code">${k.key}</span></td>
                        <td>${createdDate}</td>
                        <td>${expiresDate}</td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td>
                            <div class="actions">
                                <button class="btn btn-sm" data-action="copy" data-key="${k.key}">📋</button>
                                <button class="btn btn-sm btn-danger" data-action="delete" data-id="${k.id}">🗑</button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
            const now = Date.now();
            const active = keys.filter(k => !k.used && (k.expiresAt === 0 || k.expiresAt > now)).length;
            const expired = keys.filter(k => !k.used && k.expiresAt !== 0 && k.expiresAt < now).length;
            document.getElementById('activeCount').textContent = active;
            document.getElementById('expiredCount').textContent = expired;
            document.getElementById('totalCount').textContent = keys.length;
            document.getElementById('keysCount').textContent = keys.length;
        }

        document.addEventListener('DOMContentLoaded', loadKeys);

        document.getElementById('generateBtn').addEventListener('click', function() {
            const prefix = document.getElementById('prefixInput').value.trim();
            const days = parseInt(document.getElementById('durationSelect').value);
            const keyObj = generateKey(prefix, days);
            addKey(keyObj);
            const fb = document.getElementById('copyFeedback');
            fb.textContent = '✅ Ключ создан: ' + keyObj.key;
            fb.classList.add('show');
            setTimeout(() => fb.classList.remove('show'), 3000);
        });

        document.getElementById('bulkBtn').addEventListener('click', function() {
            const count = parseInt(document.getElementById('bulkCount').value) || 5;
            const prefix = document.getElementById('prefixInput').value.trim();
            const days = parseInt(document.getElementById('durationSelect').value);
            for (let i = 0; i < Math.min(count, 50); i++) {
                const keyObj = generateKey(prefix, days);
                keys.unshift(keyObj);
            }
            saveKeys();
            const fb = document.getElementById('copyFeedback');
            fb.textContent = `✅ Создано ${Math.min(count, 50)} ключей`;
            fb.classList.add('show');
            setTimeout(() => fb.classList.remove('show'), 3000);
        });

        document.getElementById('keysBody').addEventListener('click', function(e) {
            const target = e.target.closest('button');
            if (!target) return;
            const action = target.dataset.action;
            if (action === 'copy') {
                const key = target.dataset.key;
                navigator.clipboard.writeText(key).then(() => {
                    const fb = document.getElementById('copyFeedback');
                    fb.textContent = '✅ Скопировано: ' + key;
                    fb.classList.add('show');
                    setTimeout(() => fb.classList.remove('show'), 2000);
                }).catch(() => {
                    const textarea = document.createElement('textarea');
                    textarea.value = key;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    const fb = document.getElementById('copyFeedback');
                    fb.textContent = '✅ Скопировано: ' + key;
                    fb.classList.add('show');
                    setTimeout(() => fb.classList.remove('show'), 2000);
                });
            }
            if (action === 'delete') {
                const id = target.dataset.id;
                if (confirm('Удалить этот ключ?')) {
                    keys = keys.filter(k => k.id !== id);
                    saveKeys();
                }
            }
        });

        document.getElementById('clearAllBtn').addEventListener('click', function() {
            if (keys.length === 0) return;
            if (confirm('Удалить ВСЕ ключи?')) {
                keys = [];
                saveKeys();
                const fb = document.getElementById('copyFeedback');
                fb.textContent = '🗑 Все ключи удалены';
                fb.classList.add('show');
                setTimeout(() => fb.classList.remove('show'), 2000);
            }
        });

        document.getElementById('prefixInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('generateBtn').click();
        });

        console.log('🔑 Key System loaded. Keys stored in localStorage.');
        console.log('📋 JSON для Lua:', JSON.stringify(keysData));
    </script>
</body>
</html>
